services:

  # ─────────────────────────────────────────
  # Base de dados PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: nexusops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-nexusops}
      POSTGRES_USER:     ${POSTGRES_USER:-nexusops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ:                Europe/Lisbon
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusops} -d ${POSTGRES_DB:-nexusops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # Aplicação Next.js
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusops_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nexusops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexusops}
      JWT_SECRET:   ${JWT_SECRET}
      NODE_ENV:     production
      TZ:           Europe/Lisbon
    ports:
      - "3030:3000"
    volumes:
      - app_uploads:/app/uploads   # ficheiros gerados (iCal, relatórios, XML e-DA)

volumes:
  pgdata:
  app_uploads:
